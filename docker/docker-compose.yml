# =============================================================================
# CovalentAgent Docker Compose
# =============================================================================
#
# Usage:
#   cp .env.example .env   # fill in your API keys
#
#   # Run the Streamlit demo (default)
#   docker compose -f docker/docker-compose.yml up app
#
#   # Run a one-off CLI analysis
#   docker compose -f docker/docker-compose.yml run --rm cli
#
#   # Rebuild after code changes
#   docker compose -f docker/docker-compose.yml build
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # app: Streamlit demo UI (default service)
  # ---------------------------------------------------------------------------
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8501:8501"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - HF_TOKEN=${HF_TOKEN:-}
      - PUBMED_API_KEY=${PUBMED_API_KEY:-}
      - CHROMA_PERSIST_DIR=/app/chroma_data
      - ESM_MODEL=${ESM_MODEL:-facebook/esm2_t33_650M_UR50D}
      - CHEMPROP_MODEL_DIR=/app/models/cached
    volumes:
      - ../data:/app/data
      - chroma_data:/app/chroma_data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  # ---------------------------------------------------------------------------
  # cli: one-off CLI runs (only starts when explicitly invoked)
  # ---------------------------------------------------------------------------
  cli:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["python", "-m", "covalent_agent", "--target", "KRAS", "--residue", "C12"]
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - HF_TOKEN=${HF_TOKEN:-}
      - PUBMED_API_KEY=${PUBMED_API_KEY:-}
      - CHROMA_PERSIST_DIR=/app/chroma_data
      - ESM_MODEL=${ESM_MODEL:-facebook/esm2_t33_650M_UR50D}
      - CHEMPROP_MODEL_DIR=/app/models/cached
    volumes:
      - ../data:/app/data
      - chroma_data:/app/chroma_data
    profiles:
      - cli

volumes:
  chroma_data:
    driver: local
